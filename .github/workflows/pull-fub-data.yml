# =============================================================
# FUB Data Sync — GitHub Actions Workflow
#
# PRIMARY automation for all scheduled data pulls. This is the
# single source of truth for scheduling. Do NOT use pg_cron or
# other schedulers — see ARCHITECTURE.md for rationale.
#
# Schedule overview (PST / UTC):
#   3am PST  (11:00 UTC) — Agent sync + Calls (overnight lock-in)
#   7am PST  (15:00 UTC) — Calls + SmartLists (morning open)
#   9am PST  (17:00 UTC) — Calls + SmartLists
#  11am PST  (19:00 UTC) — Calls + SmartLists
#   1pm PST  (21:00 UTC) — Calls + SmartLists
#   3pm PST  (23:00 UTC) — Calls + SmartLists
#   5pm PST  (01:00 UTC) — Calls + SmartLists (end of day)
#
# NOTE: During PDT (Mar–Nov), local times shift 1hr later
# (e.g., the 15:00 UTC run fires at 8am PDT instead of 7am PST).
# UTC crons stay fixed. This is acceptable — coverage still
# spans the business day.
# =============================================================

name: FUB Data Sync

on:
  schedule:
    # 3am PST = 11:00 UTC — agent sync + overnight call lock-in
    - cron: '0 11 * * *'
    # Business-day refreshes: every 2hrs from 7am–5pm PST
    - cron: '0 15 * * *'   # 7am PST
    - cron: '0 17 * * *'   # 9am PST
    - cron: '0 19 * * *'   # 11am PST
    - cron: '0 21 * * *'   # 1pm PST
    - cron: '0 23 * * *'   # 3pm PST
    - cron: '0 1 * * *'    # 5pm PST
  workflow_dispatch:
    # Manual trigger runs ALL steps

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FUB_API_KEY: ${{ secrets.FUB_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ── Agents: 3am PST daily only ──────────────────────────
      - name: Sync agents
        if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
        run: node scripts/sync-agents.js

      # ── Calls: every run (incremental, lightweight) ──────────
      - name: Pull call data
        run: node scripts/pull-fub-calls.js

      # ── Smart Lists: every business-day run (skip 3am) ───────
      - name: Pull smart list data
        if: github.event.schedule != '0 11 * * *' || github.event_name == 'workflow_dispatch'
        run: node scripts/pull-fub-data.js
