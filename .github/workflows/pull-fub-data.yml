# =============================================================
# FUB Data Sync — GitHub Actions Workflow
#
# PRIMARY automation for all scheduled data pulls. This is the
# single source of truth for scheduling. Do NOT use pg_cron or
# other schedulers — see ARCHITECTURE.md for rationale.
#
# Schedule overview (PST / UTC):
#   3:00am PST  (11:00 UTC) — Agent sync + Calls only
#   6:00am–5:00pm PST       — Calls + SmartLists every 15 min
#
# The 15-min cadence covers:
#   6am–3:45pm PST  = */15 at UTC hours 0,14-23
#   5:00pm PST      = 0 1 UTC (final business-day run)
#
# NOTE: During PDT (Mar–Nov), local times shift 1hr later
# (e.g., the 14:00 UTC run fires at 7am PDT instead of 6am PST).
# UTC crons stay fixed. This is acceptable — coverage still
# spans the business day with ample margin.
# =============================================================

name: FUB Data Sync

on:
  schedule:
    # 3am PST = 11:00 UTC — agent sync + overnight call lock-in
    - cron: '0 11 * * *'

    # Business-day refreshes: every 15 min from 6am–5pm PST
    #   UTC hours 14-23 = 6am–3:45pm PST
    #   UTC hours 0-1   = 4pm–5pm PST
    #   (concurrency group prevents overlapping runs)
    - cron: '*/15 0-1,14-23 * * *'

  workflow_dispatch:
    # Manual trigger runs ALL steps

concurrency:
  group: fub-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FUB_API_KEY: ${{ secrets.FUB_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ── Agents: 3am PST daily only ──────────────────────────
      - name: Sync agents
        if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
        run: node scripts/sync-agents.js

      # ── Calls: every run (incremental, lightweight) ──────────
      - name: Pull call data
        run: node scripts/pull-fub-calls.js

      # ── Smart Lists: every business-day run (skip 3am) ───────
      - name: Pull smart list data
        if: github.event.schedule != '0 11 * * *' || github.event_name == 'workflow_dispatch'
        run: node scripts/pull-fub-data.js

      # ── Streaks: recalculate after smart list data updates ──
      - name: Calculate streaks
        if: github.event.schedule != '0 11 * * *' || github.event_name == 'workflow_dispatch'
        run: node scripts/calc-streaks.js

      # ── Debug/Backfill: manual trigger only ─────────────────
      - name: Debug call counts (FUB API vs Supabase)
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/debug-call-counts.js

      - name: Backfill call data (45 days)
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/backfill-calls.js
