name: Test FUB Texts API
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FUB_API_KEY: ${{ secrets.FUB_API_KEY }}
    steps:
      - name: Run test
        run: |
          cat << 'SCRIPT' | node
          const FUB_API_KEY = process.env.FUB_API_KEY;
          const token = Buffer.from(FUB_API_KEY + ':').toString('base64');
          const headers = {
            Authorization: 'Basic ' + token,
            'Content-Type': 'application/json',
            'X-System': 'WhisselTracker',
            'X-System-Key': 'fub-tracker-v1',
          };
          async function tryEndpoint(url, label) {
            console.log('\n=== ' + label + ' ===');
            console.log('URL: ' + url);
            const resp = await fetch(url, { headers });
            console.log('Status: ' + resp.status);
            if (!resp.ok) {
              console.log('Error: ' + (await resp.text()).substring(0, 500));
              return;
            }
            const data = await resp.json();
            const keys = Object.keys(data);
            console.log('Response keys: ' + JSON.stringify(keys));
            // Find the array in the response
            for (const k of keys) {
              if (Array.isArray(data[k]) && data[k].length > 0) {
                const item = data[k][0];
                console.log('Array key: ' + k + ' (' + data[k].length + ' items)');
                console.log('Item fields: ' + JSON.stringify(Object.keys(item)));
                // Redact message content but show structure
                const safe = {};
                for (const [fk, fv] of Object.entries(item)) {
                  if (typeof fv === 'string' && fv.length > 100) safe[fk] = '[REDACTED]';
                  else safe[fk] = fv;
                }
                console.log('Sample: ' + JSON.stringify(safe, null, 2));
                break;
              }
            }
          }
          async function main() {
            // Test 1: textMessages with personId (pick a known person)
            await tryEndpoint('https://api.followupboss.com/v1/textMessages?personId=1&limit=1', 'textMessages with personId=1');
            // Test 2: Try getting a person to find a valid personId first
            await tryEndpoint('https://api.followupboss.com/v1/people?limit=1&sort=-lastActivity', 'people (most recent)');
            // Test 3: Try the calls endpoint to compare fields
            await tryEndpoint('https://api.followupboss.com/v1/calls?limit=1&sort=-created', 'calls (for comparison)');
          }
          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
